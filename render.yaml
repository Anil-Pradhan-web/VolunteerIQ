services:
  - type: web
    name: volunteeriq-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    disk:
      name: volunteeriq-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DATABASE_URL
        fromDatabase:
          name: volunteeriq-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN_REGEX
        value: https://.*\\.vercel\\.app
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: MAX_UPLOAD_SIZE_MB
        value: 10

databases:
  - name: volunteeriq-db
    plan: basic-256mb
    databaseName: volunteeriq
    user: volunteeriq
